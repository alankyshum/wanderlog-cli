name = "wanderlog-calendar"
main = "src/index.mjs"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "calendar.alanshum.org/wanderlog*"
zone_name = "alanshum.org"

[[kv_namespaces]]
binding = "WANDERLOG_KV"
id = "PLACEHOLDER_KV_ID"
preview_id = "PLACEHOLDER_PREVIEW_KV_ID"

[vars]
WANDERLOG_BASE_URL = "https://wanderlog.com"
CALENDAR_VERSION = "0.1.0"

# Secrets set via: wrangler secret put ADMIN_TOKEN ; wrangler secret put WANDERLOG_COOKIE
